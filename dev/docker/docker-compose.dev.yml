
x-default-environment: &default-environment
  MESSAGE_BUS_HOST: redis
  CACHE_HOST: redis
  CACHE_PORT: 6379
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: openslides
  DATABASE_USER: openslides
  DATABASE_IDP_DB: zitadel
  PGPASSWORD: openslides
  OPENSLIDES_DEVELOPMENT: 1

x-zitadel-environment: &zitadel-environment
  POSTGRES_USER: openslides
  POSTGRES_PASSWORD: openslides
  POSTGRES_DB: openslides

  ZITADEL_MASTERKEY: MasterkeyNeedsToHave32Characters

  ZITADEL_DEFAULT_EXTERNAL_URL: localhost
  ZITADEL_DEFAULT_PORT: 8080
  ZITADEL_DEFAULT_EXTERNAL_PORT: 443
  ZITADEL_DEFAULT_SSL: http

  ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
  ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
  ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
  ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
  ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"

  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: app-setup
  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap Service Account
  ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${SETUP_PAT_EXPIRATION:-2099-01-01T00:00:00Z}
  ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat

services:
  postgres:
    image: postgres:17
    environment:
      << : *default-environment
      POSTGRES_USER: openslides
      POSTGRES_PASSWORD: openslides
      POSTGRES_DB: openslides
    volumes:
      - ./idp_setup.sql:/docker-entrypoint-initdb.d/idp_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openslides -d openslides"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  client:
    build:
        context: ../../openslides-client
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-client-dev
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-client/client/src:/app/src
      - ../../openslides-client/client/cli:/app/cli
      - ../../openslides-client/packages/openslides-motion-diff/src:/packages/openslides-motion-diff/src

  backend:
    build:
        context: ../../openslides-backend
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-backend-dev
    depends_on:
      auth:
        condition: service_started
      idp-setup:
        condition: service_completed_successfully
    env_file: services.env
    ports:
      - "9002:9002"
      - "9003:9003"
      - "5678:5678"
    environment:
      << : *default-environment
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      # - EMAIL_HOST_USER username
      # - EMAIL_HOST_PASSWORD secret
      # EMAIL_CONNECTION_SECURITY use NONE, STARTTLS or SSL/TLS
      EMAIL_CONNECTION_SECURITY: NONE
      EMAIL_TIMEOUT: 5
      EMAIL_ACCEPT_SELF_SIGNED_CERTIFICATE: false
      DEFAULT_FROM_EMAIL: noreply@example.com
      OPENSLIDES_BACKEND_CREATE_INITIAL_DATA: 1
      IDP_URL_INTERNAL: http://zitadel-api:8080
      IDP_OS_REALM: openslides
    volumes:
      - ../../openslides-backend/openslides_backend:/app/openslides_backend
      - ../../openslides-backend/tests:/app/tests
      - ../../openslides-backend/cli:/app/cli
      - ../../openslides-backend/data:/app/data
      - ../../openslides-backend/meta:/app/meta
      - ../../openslides-backend/requirements:/app/requirements
      - ../../openslides-backend/scripts:/app/scripts
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro

  autoupdate:
    build:
        context: ../../openslides-autoupdate-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-autoupdate-dev
    depends_on:
      - redis
    env_file: services.env
    environment:
      << : *default-environment
      DATASTORE_TIMEOUT: 30
    volumes:
      - ../../openslides-autoupdate-service/internal:/app/openslides-autoupdate-service/internal
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/autoupdate.work:/app/go.work
    ports:
      - "9012:9012"

  icc:
    build:
        context: ../../openslides-icc-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-icc-dev
    depends_on:
      - redis
      - auth
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-icc-service/internal:/app/openslides-icc-service/internal
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/icc.work:/app/go.work
    ports:
      - "9007:9007"

  search:
    build:
        context: ../../openslides-search-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-search-dev
    depends_on:
      autoupdate:
        condition: service_started
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-search-service/cmd:/app/openslides-search-service/cmd
      - ../../openslides-search-service/pkg:/app/openslides-search-service/pkg
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/search.work:/app/go.work
    ports:
      - "9050:9050"

  projector:
    build:
        context: ../../openslides-projector-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-projector-dev
    depends_on:
      autoupdate:
        condition: service_started
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      - OPENSLIDES_DEVELOPMENT=1
    volumes:
      - ../../openslides-projector-service/cmd:/root/openslides-projector-service/cmd
      - ../../openslides-projector-service/pkg:/root/openslides-projector-service/pkg
      - ../../openslides-projector-service/locale:/root/openslides-projector-service/locale
      - ../../openslides-projector-service/templates:/root/openslides-projector-service/templates
      - ../../openslides-projector-service/web:/root/openslides-projector-service/web
      - ../../lib/openslides-go:/root/lib/openslides-go
      - ./workspaces/projector.work:/root/go.work
    ports:
      - "9051:9051"

  auth:
    build:
        context: ../../openslides-auth-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-auth-dev
    depends_on:
      - redis
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-auth-service/auth/src:/app/src
      - ../../openslides-auth-service/auth/libraries:/app/libraries
      - ../../openslides-auth-service/auth/test:/app/test
    ports:
      - "9004:9004"

  media:
    build:
        context: ../../openslides-media-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-media-dev
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-media-service/src:/app/src

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    environment:
      << : *default-environment

  proxy:
    build:
        context: ../../openslides-proxy
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-proxy-dev
    environment:
      << : *default-environment
    depends_on:
      - client
      - backend
      - autoupdate
      - zitadel-api
    volumes:
      - ../../openslides-proxy/services:/services
      - ../../openslides-proxy/templates:/templates
      - ../../openslides-proxy/plugins-local:/app/plugins-local
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
    ports:
      - "8000:8000"

  mailhog:
    image: mailhog/mailhog
    environment:
      << : *default-environment
    logging:
      driver: "none" # disable saving logs
    ports:
      - "8025:8025" # web ui to check mails manually

  vote:
    build:
        context: ../../openslides-vote-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-vote-dev
    depends_on:
      auth:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
      VOTE_DISABLE_LOG: true
    volumes:
      - ../../openslides-vote-service/vote:/app/openslides-vote-service/vote
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/vote.work:/app/go.work
    ports:
      - "9013:9013"

  idp-setup:
    build:
        context: ../../openslides-idp-service
        target: "dev"
        args:
            CONTEXT: "dev"
    environment:
      << : [*default-environment, *zitadel-environment]

      ZITADEL_INTERNAL_URL: http://zitadel-api:8080
      # Must match ZITADEL_EXTERNALDOMAIN:ZITADEL_EXTERNALPORT so that Zitadel
      # can resolve the instance from the Host header on every API call.
      ZITADEL_EXTERNAL_HOST: ${ZITADEL_EXTERNAL_HOST:-localhost:8080}
      ZITADEL_REDIRECT_URI: ${ZITADEL_REDIRECT_URI:-http://localhost:8089/api/auth/callback}
      APP_REDIRECT_URL: ${APP_REDIRECT_URL:-http://localhost}
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:rw
    depends_on:
      zitadel-api:
        condition: service_started
    restart: "no"

  zitadel-init:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    command: ["init", "schema", "--config", "/app/defaults.yml"]
    environment:
      << : [*default-environment, *zitadel-environment]
    volumes:
      - ../../openslides-idp-service/zitadel/defaults.yml:/app/defaults.yml
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-setup:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    command: ["setup", "--config", "/app/defaults.yml", "--masterkey", "MasterkeyNeedsToHave32Characters"]
    environment:
      << : [*default-environment, *zitadel-environment]
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:rw
      - ../../openslides-idp-service/zitadel/defaults.yml:/app/defaults.yml
    depends_on:
      zitadel-init:
        condition: service_completed_successfully

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.13.0
    command: ["start", "--config", "/app/defaults.yml", "--masterkey", "MasterkeyNeedsToHave32Characters"]
    environment:
      << : [*default-environment, *zitadel-environment]
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
      - ../../openslides-idp-service/zitadel/defaults.yml:/app/defaults.yml
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zitadel.entrypoints=zitadel"
      - "traefik.http.routers.zitadel.rule=Host(`${ZITADEL_EXTERNALDOMAIN:-localhost}`)"

      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c

      - traefik.http.middlewares.zitadel-strip-api.stripprefix.prefixes=/api
      - traefik.http.middlewares.zitadel-strip-api.stripprefix.forceSlash=false

      # Note: no dedicated gRPC router needed. All gRPC and Connect-RPC traffic
      # is handled by the catch-all router below since the backend already uses h2c.

      - traefik.http.routers.zitadel-api-alias-web.rule=Host(`localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-web.entrypoints=web
      - traefik.http.routers.zitadel-api-alias-web.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-web.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-web.priority=200

      - traefik.http.routers.zitadel-api-alias-websecure.rule=Host(`localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.zitadel-api-alias-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-api-alias-websecure.tls=true
      - traefik.http.routers.zitadel-api-alias-websecure.middlewares=zitadel-strip-api
      - traefik.http.routers.zitadel-api-alias-websecure.service=zitadel-api
      - traefik.http.routers.zitadel-api-alias-websecure.priority=200

      - traefik.http.routers.zitadel-canonical-web.rule=Host(`localhost`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-web.entrypoints=web
      - traefik.http.routers.zitadel-canonical-web.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-web.priority=100

      - traefik.http.routers.zitadel-canonical-websecure.rule=Host(`localhost`) && !PathPrefix(`/ui/v2/login`) && !PathPrefix(`/api`) && !Path(`/`)
      - traefik.http.routers.zitadel-canonical-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-canonical-websecure.tls=true
      - traefik.http.routers.zitadel-canonical-websecure.service=zitadel-api
      - traefik.http.routers.zitadel-canonical-websecure.priority=100

    ports:
      - "8080:8080"

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.13.0
    restart: unless-stopped
    user: "0"
    environment:
      << : [*default-environment, *zitadel-environment]

      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      - zitadel-api

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zitadel-login.entrypoints=zitadel"
      # More specific than the catch-all Host() rule on the zitadel router
      - "traefik.http.routers.zitadel-login.rule=Host(`${ZITADEL_EXTERNALDOMAIN:-localhost}`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"
      # Inject x-zitadel-forward-host so that zitadel-login populates instanceHost in
      # getServiceConfig. Without it the JWKS fetch for logout token verification carries
      # only x-zitadel-public-host; Zitadel then falls back to the HTTP Host header
      # (zitadel:8080) which is not a registered instance domain and returns 404.
      - "traefik.http.middlewares.zitadel-login-forward-host.headers.customrequestheaders.x-zitadel-forward-host=${ZITADEL_EXTERNAL_HOST:-localhost:8080}"
      - "traefik.http.routers.zitadel-login.middlewares=zitadel-login-forward-host"

      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/

      - traefik.http.routers.zitadel-root-web.rule=Host(`localhost`) && Path(`/`)
      - traefik.http.routers.zitadel-root-web.entrypoints=web
      - traefik.http.routers.zitadel-root-web.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-web.service=zitadel-login
      - traefik.http.routers.zitadel-root-web.priority=400

      - traefik.http.routers.zitadel-root-websecure.rule=Host(`localhost`) && Path(`/`)
      - traefik.http.routers.zitadel-root-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-root-websecure.tls=true
      - traefik.http.routers.zitadel-root-websecure.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root-websecure.service=zitadel-login
      - traefik.http.routers.zitadel-root-websecure.priority=400

      - traefik.http.routers.zitadel-login-web.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-web.entrypoints=web
      - traefik.http.routers.zitadel-login-web.service=zitadel-login
      - traefik.http.routers.zitadel-login-web.priority=250

      - traefik.http.routers.zitadel-login-websecure.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login-websecure.entrypoints=websecure
      - traefik.http.routers.zitadel-login-websecure.tls=true
      - traefik.http.routers.zitadel-login-websecure.service=zitadel-login
      - traefik.http.routers.zitadel-login-websecure.priority=250
    ports:
      - "3000:3000"
