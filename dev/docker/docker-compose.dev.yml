
x-default-environment: &default-environment
  MESSAGE_BUS_HOST: redis
  CACHE_HOST: redis
  CACHE_PORT: 6379
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: openslides
  DATABASE_USER: openslides
  DATABASE_IDP_DB: zitadel
  PGPASSWORD: openslides
  OPENSLIDES_DEVELOPMENT: 1

services:
  postgres:
    image: postgres:17
    environment:
      << : *default-environment
      POSTGRES_USER: openslides
      POSTGRES_PASSWORD: openslides
      POSTGRES_DB: openslides
    volumes:
      - ./idp_setup.sql:/docker-entrypoint-initdb.d/idp_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openslides -d openslides"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  client:
    build:
        context: ../../openslides-client
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-client-dev
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-client/client/src:/app/src
      - ../../openslides-client/client/cli:/app/cli
      - ../../openslides-client/packages/openslides-motion-diff/src:/packages/openslides-motion-diff/src

  backend:
    build:
        context: ../../openslides-backend
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-backend-dev
    depends_on:
      idp-setup:
        condition: service_completed_successfully
    env_file: services.env
    ports:
      - "9002:9002"
      - "9003:9003"
      - "5678:5678"
    environment:
      << : *default-environment
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      # - EMAIL_HOST_USER username
      # - EMAIL_HOST_PASSWORD secret
      # EMAIL_CONNECTION_SECURITY use NONE, STARTTLS or SSL/TLS
      EMAIL_CONNECTION_SECURITY: NONE
      EMAIL_TIMEOUT: 5
      EMAIL_ACCEPT_SELF_SIGNED_CERTIFICATE: false
      DEFAULT_FROM_EMAIL: noreply@example.com
      OPENSLIDES_BACKEND_CREATE_INITIAL_DATA: 1
      IDP_URL_INTERNAL: http://zitadel-api:8080
      IDP_OS_REALM: openslides
    volumes:
      - ../../openslides-backend/openslides_backend:/app/openslides_backend
      - ../../openslides-backend/tests:/app/tests
      - ../../openslides-backend/cli:/app/cli
      - ../../openslides-backend/data:/app/data
      - ../../openslides-backend/meta:/app/meta
      - ../../openslides-backend/requirements:/app/requirements
      - ../../openslides-backend/scripts:/app/scripts
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro

  autoupdate:
    build:
        context: ../../openslides-autoupdate-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-autoupdate-dev
    depends_on:
      - redis
    env_file: services.env
    environment:
      << : *default-environment
      DATASTORE_TIMEOUT: 30
    volumes:
      - ../../openslides-autoupdate-service/internal:/app/openslides-autoupdate-service/internal
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/autoupdate.work:/app/go.work
    ports:
      - "9012:9012"

  icc:
    build:
        context: ../../openslides-icc-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-icc-dev
    depends_on:
      - redis
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-icc-service/internal:/app/openslides-icc-service/internal
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/icc.work:/app/go.work
    ports:
      - "9007:9007"

  search:
    build:
        context: ../../openslides-search-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-search-dev
    depends_on:
      autoupdate:
        condition: service_started
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-search-service/cmd:/app/openslides-search-service/cmd
      - ../../openslides-search-service/pkg:/app/openslides-search-service/pkg
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/search.work:/app/go.work
    ports:
      - "9050:9050"

  projector:
    build:
        context: ../../openslides-projector-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-projector-dev
    depends_on:
      autoupdate:
        condition: service_started
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      - OPENSLIDES_DEVELOPMENT=1
    volumes:
      - ../../openslides-projector-service/cmd:/root/openslides-projector-service/cmd
      - ../../openslides-projector-service/pkg:/root/openslides-projector-service/pkg
      - ../../openslides-projector-service/locale:/root/openslides-projector-service/locale
      - ../../openslides-projector-service/templates:/root/openslides-projector-service/templates
      - ../../openslides-projector-service/web:/root/openslides-projector-service/web
      - ../../lib/openslides-go:/root/lib/openslides-go
      - ./workspaces/projector.work:/root/go.work
    ports:
      - "9051:9051"

  media:
    build:
        context: ../../openslides-media-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-media-dev
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
    volumes:
      - ../../openslides-media-service/src:/app/src

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    environment:
      << : *default-environment

  proxy:
    build:
        context: ../../openslides-proxy
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-proxy-dev
    environment:
      << : *default-environment
    depends_on:
      - client
      - backend
      - autoupdate
      - zitadel-api
    volumes:
      - ../../openslides-proxy/services:/services
      - ../../openslides-proxy/templates:/templates
      - ../../openslides-proxy/plugins-local:/app/plugins-local
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
    ports:
      - "8000:8000"

  mailhog:
    image: mailhog/mailhog
    environment:
      << : *default-environment
    logging:
      driver: "none" # disable saving logs
    ports:
      - "8025:8025" # web ui to check mails manually

  vote:
    build:
        context: ../../openslides-vote-service
        target: "dev"
        args:
            CONTEXT: "dev"
    image: openslides-vote-dev
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file: services.env
    environment:
      << : *default-environment
      VOTE_DISABLE_LOG: true
    volumes:
      - ../../openslides-vote-service/vote:/app/openslides-vote-service/vote
      - ../../lib/openslides-go:/app/lib/openslides-go
      - ./workspaces/vote.work:/app/go.work
    ports:
      - "9013:9013"

  idp-setup:
    build:
        context: ../../openslides-idp-service
        target: "dev"
        args:
            CONTEXT: "dev"
    environment:
      << : [*default-environment]
      ZITADEL_INTERNAL_URL: http://zitadel-api:8080
      # Must match ZITADEL_EXTERNALDOMAIN:ZITADEL_EXTERNALPORT so that Zitadel
      # can resolve the instance from the Host header on every API call.
      ZITADEL_REDIRECT_URI: ${ZITADEL_REDIRECT_URI:-https://localhost:8000/api/auth/callback}
      APP_REDIRECT_URL: ${APP_REDIRECT_URL:-https://localhost:8000}
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:rw
    depends_on:
      zitadel-api:
        condition: service_started
    restart: "no"

  zitadel-init:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    command: ["init", "schema"]
    env_file: ../../openslides-idp-service/zitadel/default.env
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-setup:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    command: ["setup", "--masterkeyFromEnv"]
    user: "0"
    environment:
      << : [*default-environment]
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:rw
    env_file:
      - path: ../../openslides-idp-service/zitadel/default.env
      - path: ../../openslides-idp-service/zitadel/steps.env
    depends_on:
      zitadel-init:
        condition: service_completed_successfully

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:v4.15.3
    command: ["start", "--masterkeyFromEnv"]
    environment:
      << : [*default-environment]
    env_file: ../../openslides-idp-service/zitadel/default.env
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.3
    restart: unless-stopped
    user: "0"
    environment:
      << : [*default-environment]
      ZITADEL_API_URL: http://zitadel-api:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - ../../openslides-idp-service/zitadel-bootstrap:/zitadel/bootstrap:ro
    depends_on:
      - zitadel-api
    ports:
      - "3000:3000"
