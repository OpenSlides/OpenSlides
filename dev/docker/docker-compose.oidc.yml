
x-oidc-environment: &oidc-environment
  OIDC_ENABLED: "true"
  OIDC_PROVIDER_URL: https://localhost:8000/auth/realms/openslides
  OIDC_INTERNAL_PROVIDER_URL: http://keycloak:8080/auth/realms/openslides
  OIDC_ISSUER_URL: https://localhost:8000/auth/realms/openslides
  OIDC_INTERNAL_ISSUER_URL: http://keycloak:8080/auth/realms/openslides
  OIDC_CLIENT_ID: openslides-client
  OIDC_CLIENT_SECRET: openslides-secret

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: openslides
      KC_DB_PASSWORD: openslides
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: https://localhost:8000/auth
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres

  postgres:
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d

  proxy:
    environment:
      <<: *oidc-environment
      OIDC_SESSION_SECRET: super-secret-key-for-dev-only!!!
    depends_on:
      - keycloak

  backend:
    environment:
      <<: *oidc-environment
      KEYCLOAK_ADMIN_API_ENABLED: "true"
      KEYCLOAK_ADMIN_API_URL: http://keycloak:8080/auth/admin/realms/openslides

  autoupdate:
    environment:
      <<: *oidc-environment

  vote:
    environment:
      <<: *oidc-environment

  icc:
    environment:
      <<: *oidc-environment

  search:
    environment:
      <<: *oidc-environment

  projector:
    environment:
      <<: *oidc-environment

  media:
    environment:
      OPENID_CONNECT_ISSUER: http://keycloak:8080/auth/realms/openslides
      OPENID_CONNECT_CLIENT_ID: openslides-client
